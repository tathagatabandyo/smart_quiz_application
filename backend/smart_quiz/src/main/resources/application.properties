spring.application.name=smart_quiz
server.port = 8085

# MariaDB Configuration
spring.datasource.url=jdbc:mariadb://127.0.0.1:3307/smart_quiz
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# JWT
jwt.secret=45FdE#4Asfj*9CfgbOrTU
jwt.expiration=86400000

# Spring AI with DeepSeek (OpenAI-compatible API)
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:sk-e...}
spring.ai.openai.chat.model=deepseek-v4-flash
spring.ai.openai.chat.temperature=0.2
spring.ai.openai.chat.max-tokens=8000
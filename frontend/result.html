<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Quiz - Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Smart Quiz</a>
            <div class="d-flex align-items-center">
                <a href="history.html" class="btn btn-outline-light btn-sm me-2">← History</a>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm me-3">← Dashboard</a>
                <span class="navbar-text me-3" id="userName"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="errorAlert" class="alert alert-danger d-none"></div>
        
        <!-- Score Summary Card -->
        <div class="result-summary-card shadow mb-4">
            <div class="card-body text-center p-5">
                <h3 id="resultQuizTitle" class="mb-3 fw-bold"></h3>
                <div class="row mt-4">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <div class="score-circle" id="scoreCircle">
                            <span class="score-value" id="resultScore">0/0</span>
                        </div>
                        <h6 class="text-muted mt-2">Score</h6>
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <div class="percentage-circle" id="percentageCircle">
                            <span class="percentage-value" id="resultPercentage">0%</span>
                        </div>
                        <h6 class="text-muted mt-2">Percentage</h6>
                    </div>
                    <div class="col-md-4 mb-3 mb-md-0">
                        <div class="status-badge-large">
                            <span class="badge bg-success" id="resultStatus">COMPLETED</span>
                        </div>
                        <h6 class="text-muted mt-2">Status</h6>
                    </div>
                </div>
            </div>
        </div>

        <!-- Answer Review Section -->
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h4 class="fw-bold mb-0">Answer Review</h4>
            <div class="review-legend">
                <span class="legend-dot correct-dot"></span> Correct
                <span class="legend-dot incorrect-dot ms-3"></span> Incorrect
                <span class="legend-dot missed-dot ms-3"></span> Missed
            </div>
        </div>
        <div id="answersList"></div>

        <div class="text-center mt-4 mb-4">
            <a href="history.html" class="btn btn-primary me-2">Back to History</a>
            <a href="dashboard.html" class="btn btn-outline-primary">Back to Dashboard</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/result.js"></script>
</body>
</html>

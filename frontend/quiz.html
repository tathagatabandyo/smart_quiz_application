<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Quiz - Take Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Smart Quiz</a>
            <div class="d-flex">
                <span class="navbar-text me-3" id="userName"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="quizInfo" class="mb-3">
            <h4 id="quizTitle"></h4>
            <div class="d-flex justify-content-between">
                <span class="badge bg-info" id="questionProgress">Question 1 of 10</span>
                <span class="badge bg-warning" id="scoreDisplay">Score: 0</span>
            </div>
        </div>

        <div id="timerSection" class="text-center mb-3">
            <div class="timer-circle" id="timerDisplay">30</div>
            <p class="text-muted">seconds remaining</p>
        </div>

        <div id="errorAlert" class="alert alert-danger d-none"></div>

        <div id="questionCard" class="card shadow">
            <div class="card-body p-4">
                <h5 class="card-title mb-4" id="questionText">Loading question...</h5>
                <div id="optionsList" class="list-group"></div>
                <button id="submitBtn" class="btn btn-success w-100 mt-4" disabled>Submit Answer</button>
            </div>
        </div>

        <div id="completeSection" class="d-none text-center mt-4">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="mb-3">Quiz Completed!</h3>
                    <h1 class="display-4 text-primary" id="finalScore">0/0</h1>
                    <p class="lead" id="finalPercentage">0%</p>
                    <div class="mt-4">
                        <a href="result.html" class="btn btn-primary me-2" id="viewResultBtn">View Detailed Result</a>
                        <a href="dashboard.html" class="btn btn-outline-primary">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
